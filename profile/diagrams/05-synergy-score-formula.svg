<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 400" role="img" aria-label="시너지 점수 공식">
  <defs>
    <marker id="ah-blue" markerWidth="11" markerHeight="11" refX="8.5" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L10,5 L0,10 Z" fill="#0066cc"/></marker>
    <marker id="ah-orange" markerWidth="10" markerHeight="10" refX="8" refY="4.5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L9,4.5 L0,9 Z" fill="#ff8c00"/></marker>
    <marker id="ah-purple" markerWidth="11" markerHeight="11" refX="8.5" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L10,5 L0,10 Z" fill="#6b46c1"/></marker>
    <marker id="ah-green" markerWidth="11" markerHeight="11" refX="8.5" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L10,5 L0,10 Z" fill="#28a745"/></marker>
    <marker id="ah-red" markerWidth="11" markerHeight="11" refX="8.5" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L10,5 L0,10 Z" fill="#dc143c"/></marker>
    <style>
      svg { background: transparent; --c-online-f:#d8f0de; --c-online-s:#28a745; --c-offline-f:#e6f2ff; --c-offline-s:#2b7cd3; --c-shared-f:#fff4d6; --c-shared-s:#e0a200; --c-user-f:#ffd0d8; --c-user-s:#dc143c; --c-decision-f:#ece1ff; --c-decision-s:#6b46c1; --c-fallback-f:#ffe5b4; --c-fallback-s:#ff8c00; --c-data-f:#e0efff; --c-data-s:#0066cc; --c-llm-f:#e6d9ff; --c-llm-s:#7c3aed; --c-neutral-f:#eef1f5; --c-neutral-s:#7a8aa0; }
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill:#1a1916; font-size:14px; }
      .box{stroke-width:2}.online{fill:var(--c-online-f);stroke:var(--c-online-s)}.offline{fill:var(--c-offline-f);stroke:var(--c-offline-s)}.shared{fill:var(--c-shared-f);stroke:var(--c-shared-s)}.user{fill:var(--c-user-f);stroke:var(--c-user-s)}.decision{fill:var(--c-decision-f);stroke:var(--c-decision-s)}.fallback{fill:var(--c-fallback-f);stroke:var(--c-fallback-s);stroke-dasharray:6 3}.data{fill:var(--c-data-f);stroke:var(--c-data-s)}.llm{fill:var(--c-llm-f);stroke:var(--c-llm-s)}.neutral{fill:var(--c-neutral-f);stroke:var(--c-neutral-s)}
      .z-green{fill:#eff9f1;stroke:#9bd3a8;stroke-width:1.5}.z-blue{fill:#eff6ff;stroke:#a9cdf0;stroke-width:1.5}.z-yellow{fill:#fff9ec;stroke:#ecd28a;stroke-width:1.5}.z-red{fill:#fff1f2;stroke:#f0b3ba;stroke-width:1.5}.z-grey{fill:#f6f7f9;stroke:#cfd6e0;stroke-width:1.5;stroke-dasharray:7 4}
      .zlab{font-weight:600;fill:#42506a;font-size:14px}.t-title{font-weight:600}.t-code{font-family:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace}.t-sm{font-size:12px;fill:#5a6b80}.t-xs{font-size:11px;fill:#6a7b90}
      .flow{fill:none;stroke:#0066cc;stroke-width:2.4}.flow.fb{stroke:#ff8c00;stroke-width:2;stroke-dasharray:6 3}.flow.data{stroke:#0066cc;stroke-width:1.5;stroke-dasharray:5 3}.flow.route{stroke:#6b46c1;stroke-width:2.2}
      .flow-lbl{font-family:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace;font-size:12px;fill:#0a4a8a;font-weight:500}.flow-lbl.r{fill:#6b46c1}.flow-lbl.o{fill:#c2700a}.flow-lbl.bg{paint-order:stroke;stroke:#fcfcf8;stroke-width:5px;stroke-linejoin:round}
    </style>
  </defs>
        <rect x="60" y="34" width="1060" height="86" rx="10" fill="#eef3fa" stroke="#bcd0e8" stroke-dasharray="7 4"/>
        <text class="t-code" x="590" y="74" text-anchor="middle" font-size="21" fill="#0a3a66">synergy(a, b | jobs) = clip( <tspan fill="#1d7a39">0.3·comp</tspan> + <tspan fill="#0a55a8">0.5·cov</tspan> − <tspan fill="#c2410c">0.2·red</tspan> ,  0, 1 )</text>
        <text class="t-sm" x="590" y="102" text-anchor="middle">가중치 = 직무 도달도(cov) 최우선 · 보완성(comp) 다음 · 중복(red) 페널티 · clip 으로 [0,1] 정의역 강제</text>

        <!-- comp card -->
        <rect class="box online" x="80" y="168" width="320" height="180" rx="11"/>
        <circle cx="118" cy="200" r="17" fill="#1d7a39"/><text x="118" y="205" text-anchor="middle" font-size="13" fill="#fff" class="t-code">.30</text>
        <text class="t-title" x="150" y="198" font-size="15">보완성 comp</text>
        <text class="t-sm" x="150" y="216" font-size="11.5">complementarity · job-anchored</text>
        <text class="t-code" x="240" y="258" text-anchor="middle" font-size="13" fill="#1d7a39">|contribₐ △ cont_b|</text>
        <line x1="120" y1="270" x2="360" y2="270" stroke="#1d7a39" stroke-width="1.2"/>
        <text class="t-code" x="240" y="290" text-anchor="middle" font-size="13" fill="#1d7a39">|전체 직무 토큰|</text>
        <text x="240" y="324" text-anchor="middle" font-size="12.5">직무 토큰을 두 트랙이</text>
        <text x="240" y="340" text-anchor="middle" font-size="12.5">겹치지 않게 분담하는 정도</text>

        <!-- cov card -->
        <rect class="box offline" x="430" y="168" width="320" height="180" rx="11"/>
        <circle cx="468" cy="200" r="17" fill="#0a55a8"/><text x="468" y="205" text-anchor="middle" font-size="13" fill="#fff" class="t-code">.50</text>
        <text class="t-title" x="500" y="198" font-size="15">직무 커버율 cov</text>
        <text class="t-sm" x="500" y="216" font-size="11.5">job coverage</text>
        <text class="t-code" x="590" y="258" text-anchor="middle" font-size="13" fill="#0a55a8">|jobs ∩ (A ∪ B)|</text>
        <line x1="470" y1="270" x2="710" y2="270" stroke="#0a55a8" stroke-width="1.2"/>
        <text class="t-code" x="590" y="290" text-anchor="middle" font-size="13" fill="#0a55a8">|jobs 기술스택|</text>
        <text x="590" y="324" text-anchor="middle" font-size="12.5">직무 요구 기술 중</text>
        <text x="590" y="340" text-anchor="middle" font-size="12.5">두 트랙 합집합이 커버하는 비율</text>

        <!-- red card -->
        <rect class="box fallback" x="780" y="168" width="320" height="180" rx="11" stroke-dasharray="0"/>
        <circle cx="818" cy="200" r="17" fill="#c2410c"/><text x="818" y="205" text-anchor="middle" font-size="13" fill="#fff" class="t-code">.20</text>
        <text class="t-title" x="850" y="198" font-size="15">중복도 red</text>
        <text class="t-sm" x="850" y="216" font-size="11.5">redundancy · 페널티 (−)</text>
        <text class="t-code" x="940" y="258" text-anchor="middle" font-size="13" fill="#c2410c">|A ∩ B|</text>
        <line x1="820" y1="270" x2="1060" y2="270" stroke="#c2410c" stroke-width="1.2"/>
        <text class="t-code" x="940" y="290" text-anchor="middle" font-size="13" fill="#c2410c">|A ∪ B|</text>
        <text x="940" y="324" text-anchor="middle" font-size="12.5">두 트랙의 과목 겹침</text>
        <text x="940" y="340" text-anchor="middle" font-size="12.5"> 많이 겹치면 감점</text>
      </svg>
