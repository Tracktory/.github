<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 700" role="img" aria-label="오프라인 인덱싱 파이프라인">
  <defs>
    <marker id="ah-blue" markerWidth="11" markerHeight="11" refX="8.5" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L10,5 L0,10 Z" fill="#0066cc"/></marker>
    <marker id="ah-orange" markerWidth="10" markerHeight="10" refX="8" refY="4.5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L9,4.5 L0,9 Z" fill="#ff8c00"/></marker>
    <marker id="ah-purple" markerWidth="11" markerHeight="11" refX="8.5" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L10,5 L0,10 Z" fill="#6b46c1"/></marker>
    <marker id="ah-green" markerWidth="11" markerHeight="11" refX="8.5" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L10,5 L0,10 Z" fill="#28a745"/></marker>
    <marker id="ah-red" markerWidth="11" markerHeight="11" refX="8.5" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L10,5 L0,10 Z" fill="#dc143c"/></marker>
    <style>
      svg { background: transparent; --c-online-f:#d8f0de; --c-online-s:#28a745; --c-offline-f:#e6f2ff; --c-offline-s:#2b7cd3; --c-shared-f:#fff4d6; --c-shared-s:#e0a200; --c-user-f:#ffd0d8; --c-user-s:#dc143c; --c-decision-f:#ece1ff; --c-decision-s:#6b46c1; --c-fallback-f:#ffe5b4; --c-fallback-s:#ff8c00; --c-data-f:#e0efff; --c-data-s:#0066cc; --c-llm-f:#e6d9ff; --c-llm-s:#7c3aed; --c-neutral-f:#eef1f5; --c-neutral-s:#7a8aa0; }
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill:#1a1916; font-size:14px; }
      .box{stroke-width:2}.online{fill:var(--c-online-f);stroke:var(--c-online-s)}.offline{fill:var(--c-offline-f);stroke:var(--c-offline-s)}.shared{fill:var(--c-shared-f);stroke:var(--c-shared-s)}.user{fill:var(--c-user-f);stroke:var(--c-user-s)}.decision{fill:var(--c-decision-f);stroke:var(--c-decision-s)}.fallback{fill:var(--c-fallback-f);stroke:var(--c-fallback-s);stroke-dasharray:6 3}.data{fill:var(--c-data-f);stroke:var(--c-data-s)}.llm{fill:var(--c-llm-f);stroke:var(--c-llm-s)}.neutral{fill:var(--c-neutral-f);stroke:var(--c-neutral-s)}
      .z-green{fill:#eff9f1;stroke:#9bd3a8;stroke-width:1.5}.z-blue{fill:#eff6ff;stroke:#a9cdf0;stroke-width:1.5}.z-yellow{fill:#fff9ec;stroke:#ecd28a;stroke-width:1.5}.z-red{fill:#fff1f2;stroke:#f0b3ba;stroke-width:1.5}.z-grey{fill:#f6f7f9;stroke:#cfd6e0;stroke-width:1.5;stroke-dasharray:7 4}
      .zlab{font-weight:600;fill:#42506a;font-size:14px}.t-title{font-weight:600}.t-code{font-family:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace}.t-sm{font-size:12px;fill:#5a6b80}.t-xs{font-size:11px;fill:#6a7b90}
      .flow{fill:none;stroke:#0066cc;stroke-width:2.4}.flow.fb{stroke:#ff8c00;stroke-width:2;stroke-dasharray:6 3}.flow.data{stroke:#0066cc;stroke-width:1.5;stroke-dasharray:5 3}.flow.route{stroke:#6b46c1;stroke-width:2.2}
      .flow-lbl{font-family:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace;font-size:12px;fill:#0a4a8a;font-weight:500}.flow-lbl.r{fill:#6b46c1}.flow-lbl.o{fill:#c2700a}.flow-lbl.bg{paint-order:stroke;stroke:#fcfcf8;stroke-width:5px;stroke-linejoin:round}
    </style>
  </defs>
        <!-- offline zone -->
        <rect class="z-blue" x="50" y="40" width="1080" height="310" rx="12"/>
        <text class="zlab" x="72" y="66">오프라인 인덱싱 파이프라인 — 학기 단위 자동 배치</text>

        <!-- step 1 -->
        <rect class="box offline" x="80" y="150" width="220" height="110" rx="11"/>
        <text class="t-title" x="190" y="190" text-anchor="middle">① 수집 (크롤링)</text>
        <text x="190" y="212" text-anchor="middle" font-size="12.5">강의계획서 47트랙</text>
        <text x="190" y="230" text-anchor="middle" font-size="12.5">+ 채용공고 11분야</text>
        <text class="t-sm" x="190" y="248" text-anchor="middle">Playwright 비동기</text>
        <path class="flow" d="M300,205 L348,205" marker-end="url(#ah-blue)"/>

        <!-- step 2 -->
        <rect class="box offline" x="350" y="150" width="220" height="110" rx="11"/>
        <text class="t-title" x="460" y="190" text-anchor="middle">② 정제 · 청킹</text>
        <text x="460" y="212" text-anchor="middle" font-size="12.5">자기완결 문서 4유형</text>
        <text class="t-sm" x="460" y="232" text-anchor="middle">컨텍스트 헤더 + 표준 섹션</text>
        <text class="t-sm" x="460" y="248" text-anchor="middle">200자 청크</text>
        <path class="flow" d="M570,205 L618,205" marker-end="url(#ah-blue)"/>

        <!-- step 3 -->
        <rect class="box offline" x="620" y="150" width="200" height="110" rx="11"/>
        <text class="t-title" x="720" y="194" text-anchor="middle">③ 임베딩</text>
        <text x="720" y="216" text-anchor="middle" font-size="12.5">단일 임베딩 모델</text>
        <text class="t-sm" x="720" y="236" text-anchor="middle">질의·문서 동일 공간</text>
        <path class="flow" d="M820,205 L868,205" marker-end="url(#ah-blue)"/>

        <!-- step 4 -->
        <rect class="box offline" x="870" y="150" width="230" height="110" rx="11"/>
        <text class="t-title" x="985" y="190" text-anchor="middle">④ 관계 그래프</text>
        <text x="985" y="212" text-anchor="middle" font-size="12.5">엔티티·관계 추출</text>
        <text class="t-sm" x="985" y="232" text-anchor="middle">트랙·과목·역량·직무</text>
        <text class="t-sm" x="985" y="248" text-anchor="middle">증분 병합</text>

        <!-- LLM helper -->
        <rect class="box llm" x="870" y="288" width="230" height="48" rx="9"/>
        <text x="985" y="312" text-anchor="middle" font-size="12.5">외부 LLM — 노드·관계 추출</text>
        <text class="t-sm" x="985" y="328" text-anchor="middle">+ 직무 요약 단일 벡터</text>
        <path class="flow" d="M985,288 L985,262" marker-end="url(#ah-blue)"/>

        <!-- shared KB zone -->
        <rect class="z-yellow" x="50" y="420" width="1080" height="220" rx="12"/>
        <text class="zlab" x="72" y="446">공유 지식 베이스 — 두 파이프라인이 함께 사용</text>

        <!-- vector index cylinder -->
        <g>
          <path class="data" d="M250,470 a96,15 0 0 1 192,0 v110 a96,15 0 0 1 -192,0 z"/>
          <path class="data" d="M250,470 a96,15 0 0 0 192,0" fill="none"/>
          <text class="t-title" x="346" y="528" text-anchor="middle" font-size="14">벡터 인덱스</text>
          <text x="346" y="548" text-anchor="middle" font-size="12.5">의미 유사도 검색</text>
        </g>
        <!-- graph index cylinder -->
        <g>
          <path class="data" d="M740,470 a96,15 0 0 1 192,0 v110 a96,15 0 0 1 -192,0 z"/>
          <path class="data" d="M740,470 a96,15 0 0 0 192,0" fill="none"/>
          <text class="t-title" x="836" y="522" text-anchor="middle" font-size="14">관계 그래프 KB</text>
          <text x="836" y="542" text-anchor="middle" font-size="12.5">LightRAG · 4종 노드</text>
          <text class="t-sm" x="836" y="560" text-anchor="middle">과목·역량·직무·트랙</text>
        </g>
        <!-- edges into KBs -->
        <path class="flow" d="M720,260 L720,400 L346,400 L346,468" marker-end="url(#ah-blue)"/>
        <text class="flow-lbl bg" x="430" y="394" text-anchor="middle">벡터 적재</text>
        <path class="flow" d="M985,336 L985,400 L836,400 L836,468" marker-end="url(#ah-blue)"/>
        <text class="flow-lbl bg" x="930" y="394" text-anchor="middle">그래프 적재</text>
      </svg>
