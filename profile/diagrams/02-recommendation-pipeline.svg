<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 1320" role="img" aria-label="추천 파이프라인">
  <defs>
    <marker id="ah-blue" markerWidth="11" markerHeight="11" refX="8.5" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L10,5 L0,10 Z" fill="#0066cc"/></marker>
    <marker id="ah-orange" markerWidth="10" markerHeight="10" refX="8" refY="4.5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L9,4.5 L0,9 Z" fill="#ff8c00"/></marker>
    <marker id="ah-purple" markerWidth="11" markerHeight="11" refX="8.5" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L10,5 L0,10 Z" fill="#6b46c1"/></marker>
    <marker id="ah-green" markerWidth="11" markerHeight="11" refX="8.5" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L10,5 L0,10 Z" fill="#28a745"/></marker>
    <marker id="ah-red" markerWidth="11" markerHeight="11" refX="8.5" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L10,5 L0,10 Z" fill="#dc143c"/></marker>
    <style>
      svg { background: transparent; --c-online-f:#d8f0de; --c-online-s:#28a745; --c-offline-f:#e6f2ff; --c-offline-s:#2b7cd3; --c-shared-f:#fff4d6; --c-shared-s:#e0a200; --c-user-f:#ffd0d8; --c-user-s:#dc143c; --c-decision-f:#ece1ff; --c-decision-s:#6b46c1; --c-fallback-f:#ffe5b4; --c-fallback-s:#ff8c00; --c-data-f:#e0efff; --c-data-s:#0066cc; --c-llm-f:#e6d9ff; --c-llm-s:#7c3aed; --c-neutral-f:#eef1f5; --c-neutral-s:#7a8aa0; }
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill:#1a1916; font-size:14px; }
      .box{stroke-width:2}.online{fill:var(--c-online-f);stroke:var(--c-online-s)}.offline{fill:var(--c-offline-f);stroke:var(--c-offline-s)}.shared{fill:var(--c-shared-f);stroke:var(--c-shared-s)}.user{fill:var(--c-user-f);stroke:var(--c-user-s)}.decision{fill:var(--c-decision-f);stroke:var(--c-decision-s)}.fallback{fill:var(--c-fallback-f);stroke:var(--c-fallback-s);stroke-dasharray:6 3}.data{fill:var(--c-data-f);stroke:var(--c-data-s)}.llm{fill:var(--c-llm-f);stroke:var(--c-llm-s)}.neutral{fill:var(--c-neutral-f);stroke:var(--c-neutral-s)}
      .z-green{fill:#eff9f1;stroke:#9bd3a8;stroke-width:1.5}.z-blue{fill:#eff6ff;stroke:#a9cdf0;stroke-width:1.5}.z-yellow{fill:#fff9ec;stroke:#ecd28a;stroke-width:1.5}.z-red{fill:#fff1f2;stroke:#f0b3ba;stroke-width:1.5}.z-grey{fill:#f6f7f9;stroke:#cfd6e0;stroke-width:1.5;stroke-dasharray:7 4}
      .zlab{font-weight:600;fill:#42506a;font-size:14px}.t-title{font-weight:600}.t-code{font-family:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace}.t-sm{font-size:12px;fill:#5a6b80}.t-xs{font-size:11px;fill:#6a7b90}
      .flow{fill:none;stroke:#0066cc;stroke-width:2.4}.flow.fb{stroke:#ff8c00;stroke-width:2;stroke-dasharray:6 3}.flow.data{stroke:#0066cc;stroke-width:1.5;stroke-dasharray:5 3}.flow.route{stroke:#6b46c1;stroke-width:2.2}
      .flow-lbl{font-family:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace;font-size:12px;fill:#0a4a8a;font-weight:500}.flow-lbl.r{fill:#6b46c1}.flow-lbl.o{fill:#c2700a}.flow-lbl.bg{paint-order:stroke;stroke:#fcfcf8;stroke-width:5px;stroke-linejoin:round}
    </style>
  </defs>
        <!-- user input -->
        <rect class="box user" x="410" y="24" width="360" height="60" rx="11"/>
        <text class="t-title" x="590" y="50" text-anchor="middle">학생 입력</text>
        <text class="t-sm" x="590" y="70" text-anchor="middle">관심사 · 흥미 · 취업 선호 · 이수 트랙</text>

        <!-- pipeline container -->
        <rect class="z-grey" x="60" y="120" width="900" height="1080" rx="12"/>
        <text class="zlab" x="82" y="146">LangGraph 추천 그래프 — 공유 TypedDict 상태</text>

        <!-- N1 -->
        <rect class="box online" x="320" y="166" width="360" height="64" rx="11"/>
        <text class="t-title" x="500" y="192" text-anchor="middle"><tspan class="t-code" fill="#1d7a39">N1</tspan>  입력 정규화</text>
        <text class="t-sm" x="500" y="212" text-anchor="middle">스키마 검증 · 1학년/2학년+ 분기 · 학기 추정</text>
        <!-- N1 routing -->
        <path class="flow" d="M500,230 L500,266" marker-end="url(#ah-purple)"/>
        <rect class="box decision" x="404" y="266" width="192" height="92" transform="rotate(0)" rx="0" style="display:none"/>
        <polygon class="box decision" points="500,262 612,312 500,362 388,312"/>
        <text x="500" y="306" text-anchor="middle" font-size="12.5">검증 통과?</text>
        <text class="t-sm" x="500" y="324" text-anchor="middle">routing</text>
        <!-- route fail -->
        <path class="flow route" d="M612,312 L720,312" marker-end="url(#ah-red)"/>
        <rect class="box user" x="720" y="284" width="190" height="56" rx="9"/>
        <text x="815" y="308" text-anchor="middle" font-size="12.5">검증 실패 → 종료</text>
        <text class="t-sm" x="815" y="326" text-anchor="middle">에러 안내</text>
        <text class="flow-lbl bg r" x="660" y="304" text-anchor="middle">end</text>

        <!-- N2 -->
        <path class="flow route" d="M500,362 L500,398" marker-end="url(#ah-purple)"/>
        <text class="flow-lbl bg r" x="528" y="384">continue</text>
        <rect class="box online" x="320" y="398" width="360" height="74" rx="11"/>
        <text class="t-title" x="500" y="424" text-anchor="middle"><tspan class="t-code" fill="#1d7a39">N2</tspan>  프로필 직렬화</text>
        <text x="500" y="444" text-anchor="middle" font-size="12.5">→ profile_text (키워드형 질의)</text>
        <text class="t-sm" x="500" y="462" text-anchor="middle">임베딩 호출 X · 텍스트만 생성</text>

        <!-- N3 -->
        <path class="flow" d="M500,472 L500,508" marker-end="url(#ah-blue)"/>
        <rect class="box online" x="320" y="508" width="360" height="74" rx="11"/>
        <text class="t-title" x="500" y="534" text-anchor="middle"><tspan class="t-code" fill="#1d7a39">N3</tspan>  직무 매칭</text>
        <text x="500" y="554" text-anchor="middle" font-size="12.5">RAGFlow 검색 위임 → 상위 직무 3~5개</text>
        <text class="t-sm" x="500" y="572" text-anchor="middle">하이브리드 + 재정렬 · 이수과목 부스팅</text>
        <!-- N3 routing -->
        <path class="flow" d="M500,582 L500,610" marker-end="url(#ah-purple)"/>
        <polygon class="box decision" points="500,606 612,656 500,706 388,656"/>
        <text x="500" y="650" text-anchor="middle" font-size="12.5">최고 유사도</text>
        <text x="500" y="668" text-anchor="middle" font-size="12.5">≥ 0.1 ?</text>
        <!-- fallback F1 -->
        <path class="flow fb" d="M612,656 L724,656" marker-end="url(#ah-orange)"/>
        <text class="flow-lbl bg o" x="668" y="648" text-anchor="middle">low_sim</text>
        <rect class="box fallback" x="724" y="616" width="200" height="80" rx="9"/>
        <text x="824" y="644" text-anchor="middle" font-size="12.5">cold-start 안전 추천</text>
        <text class="t-sm" x="824" y="662" text-anchor="middle">14 관심사 카테고리</text>
        <text class="t-sm" x="824" y="678" text-anchor="middle">→ 직무 사전 매핑</text>

        <!-- N4 -->
        <path class="flow route" d="M500,706 L500,738" marker-end="url(#ah-purple)"/>
        <text class="flow-lbl bg r" x="528" y="726">normal</text>
        <path class="flow fb" d="M824,696 L824,722 L680,722" marker-end="url(#ah-orange)"/>
        <rect class="box online" x="320" y="738" width="360" height="84" rx="11"/>
        <text class="t-title" x="500" y="764" text-anchor="middle"><tspan class="t-code" fill="#1d7a39">N4</tspan>  트랙 시너지 조합</text>
        <text x="500" y="784" text-anchor="middle" font-size="12.5">시너지 점수 · MMR · 슬롯 예약</text>
        <text class="t-sm" x="500" y="802" text-anchor="middle">주 추천 2 + 보조 5 (이색 조합 포함) · §5</text>

        <!-- N5 -->
        <path class="flow" d="M500,822 L500,858" marker-end="url(#ah-blue)"/>
        <rect class="box shared" x="320" y="858" width="360" height="78" rx="11"/>
        <text class="t-title" x="500" y="884" text-anchor="middle"><tspan class="t-code" fill="#b8860b">N5</tspan>  학습 로드맵 생성</text>
        <text x="500" y="904" text-anchor="middle" font-size="12.5">선수과목 위상 정렬 · 학기 배분</text>
        <text class="t-sm" x="500" y="922" text-anchor="middle">기초→핵심→응용→산학 · 18학점/학기</text>

        <!-- N6 -->
        <path class="flow" d="M500,936 L500,972" marker-end="url(#ah-blue)"/>
        <rect class="box shared" x="320" y="972" width="360" height="78" rx="11"/>
        <text class="t-title" x="500" y="998" text-anchor="middle"><tspan class="t-code" fill="#b8860b">N6</tspan>  역량 커버리지 분석</text>
        <text x="500" y="1018" text-anchor="middle" font-size="12.5">기준 직무 대비 현재/예상 충족도</text>
        <text class="t-sm" x="500" y="1036" text-anchor="middle">분모 = 도달 가능 역량 토큰 · 부족 역량 도출</text>

        <!-- N7 -->
        <path class="flow" d="M500,1050 L500,1086" marker-end="url(#ah-blue)"/>
        <rect class="box llm" x="320" y="1086" width="360" height="80" rx="11"/>
        <text class="t-title" x="500" y="1112" text-anchor="middle"><tspan class="t-code" fill="#6d28d9">N7</tspan>  자연어 설명 생성 (LLM)</text>
        <text x="500" y="1132" text-anchor="middle" font-size="12.5">"왜 이 트랙·과목인가" — RAG 근거 주입</text>
        <text class="t-sm" x="500" y="1150" text-anchor="middle">유일한 LLM 생성 노드 · 환각 차단</text>

        <!-- output -->
        <path class="flow" d="M500,1200 L500,1238" marker-end="url(#ah-blue)"/>
        <rect class="box user" x="410" y="1238" width="360" height="60" rx="11"/>
        <text class="t-title" x="590" y="1264" text-anchor="middle">학생 화면</text>
        <text class="t-sm" x="590" y="1284" text-anchor="middle">직무 · 트랙 조합 · 로드맵 · 설명</text>

        <!-- KB cylinder right -->
        <g>
          <path class="data" d="M1000,470 a82,15 0 0 1 164,0 v360 a82,15 0 0 1 -164,0 z"/>
          <path class="data" d="M1000,470 a82,15 0 0 0 164,0" fill="none"/>
          <text class="t-title" x="1082" y="618" text-anchor="middle" font-size="14">LightRAG KB</text>
          <text x="1082" y="640" text-anchor="middle" font-size="12">47 트랙 +</text>
          <text x="1082" y="658" text-anchor="middle" font-size="12">채용공고 11분야</text>
          <text class="t-sm" x="1082" y="678" text-anchor="middle">관계 그래프</text>
        </g>
        <path class="flow data" d="M1000,560 L680,545" marker-end="url(#ah-blue)"/>
        <text class="flow-lbl bg" x="850" y="540" text-anchor="middle">직무 검색</text>
        <path class="flow data" d="M1000,720 L700,785 L680,785" marker-end="url(#ah-blue)"/>
        <text class="flow-lbl bg" x="860" y="772" text-anchor="middle">관계 탐색</text>
        <path class="flow data" d="M1000,800 L700,1010 L680,1010" marker-end="url(#ah-blue)"/>
        <path class="flow data" d="M1000,828 L720,1120 L680,1120" marker-end="url(#ah-blue)"/>
        <text class="flow-lbl bg" x="880" y="1115" text-anchor="middle">근거 컨텍스트</text>
      </svg>
