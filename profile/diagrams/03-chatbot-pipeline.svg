<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 760" role="img" aria-label="챗봇 파이프라인">
  <defs>
    <marker id="ah-blue" markerWidth="11" markerHeight="11" refX="8.5" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L10,5 L0,10 Z" fill="#0066cc"/></marker>
    <marker id="ah-orange" markerWidth="10" markerHeight="10" refX="8" refY="4.5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L9,4.5 L0,9 Z" fill="#ff8c00"/></marker>
    <marker id="ah-purple" markerWidth="11" markerHeight="11" refX="8.5" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L10,5 L0,10 Z" fill="#6b46c1"/></marker>
    <marker id="ah-green" markerWidth="11" markerHeight="11" refX="8.5" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L10,5 L0,10 Z" fill="#28a745"/></marker>
    <marker id="ah-red" markerWidth="11" markerHeight="11" refX="8.5" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L10,5 L0,10 Z" fill="#dc143c"/></marker>
    <style>
      svg { background: transparent; --c-online-f:#d8f0de; --c-online-s:#28a745; --c-offline-f:#e6f2ff; --c-offline-s:#2b7cd3; --c-shared-f:#fff4d6; --c-shared-s:#e0a200; --c-user-f:#ffd0d8; --c-user-s:#dc143c; --c-decision-f:#ece1ff; --c-decision-s:#6b46c1; --c-fallback-f:#ffe5b4; --c-fallback-s:#ff8c00; --c-data-f:#e0efff; --c-data-s:#0066cc; --c-llm-f:#e6d9ff; --c-llm-s:#7c3aed; --c-neutral-f:#eef1f5; --c-neutral-s:#7a8aa0; }
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill:#1a1916; font-size:14px; }
      .box{stroke-width:2}.online{fill:var(--c-online-f);stroke:var(--c-online-s)}.offline{fill:var(--c-offline-f);stroke:var(--c-offline-s)}.shared{fill:var(--c-shared-f);stroke:var(--c-shared-s)}.user{fill:var(--c-user-f);stroke:var(--c-user-s)}.decision{fill:var(--c-decision-f);stroke:var(--c-decision-s)}.fallback{fill:var(--c-fallback-f);stroke:var(--c-fallback-s);stroke-dasharray:6 3}.data{fill:var(--c-data-f);stroke:var(--c-data-s)}.llm{fill:var(--c-llm-f);stroke:var(--c-llm-s)}.neutral{fill:var(--c-neutral-f);stroke:var(--c-neutral-s)}
      .z-green{fill:#eff9f1;stroke:#9bd3a8;stroke-width:1.5}.z-blue{fill:#eff6ff;stroke:#a9cdf0;stroke-width:1.5}.z-yellow{fill:#fff9ec;stroke:#ecd28a;stroke-width:1.5}.z-red{fill:#fff1f2;stroke:#f0b3ba;stroke-width:1.5}.z-grey{fill:#f6f7f9;stroke:#cfd6e0;stroke-width:1.5;stroke-dasharray:7 4}
      .zlab{font-weight:600;fill:#42506a;font-size:14px}.t-title{font-weight:600}.t-code{font-family:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace}.t-sm{font-size:12px;fill:#5a6b80}.t-xs{font-size:11px;fill:#6a7b90}
      .flow{fill:none;stroke:#0066cc;stroke-width:2.4}.flow.fb{stroke:#ff8c00;stroke-width:2;stroke-dasharray:6 3}.flow.data{stroke:#0066cc;stroke-width:1.5;stroke-dasharray:5 3}.flow.route{stroke:#6b46c1;stroke-width:2.2}
      .flow-lbl{font-family:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace;font-size:12px;fill:#0a4a8a;font-weight:500}.flow-lbl.r{fill:#6b46c1}.flow-lbl.o{fill:#c2700a}.flow-lbl.bg{paint-order:stroke;stroke:#fcfcf8;stroke-width:5px;stroke-linejoin:round}
    </style>
  </defs>
        <!-- user msg -->
        <rect class="box user" x="430" y="24" width="320" height="58" rx="11"/>
        <text class="t-title" x="590" y="50" text-anchor="middle">학생 질문</text>
        <text class="t-sm" x="590" y="70" text-anchor="middle">"데이터 분석가 되려면 뭘 들어야 해?"</text>
        <path class="flow" d="M590,82 L590,120" marker-end="url(#ah-blue)"/>

        <!-- container -->
        <rect class="z-grey" x="120" y="122" width="720" height="540" rx="12"/>
        <text class="zlab" x="142" y="148">챗봇 LangGraph — thread 체크포인터</text>

        <!-- classify_intent -->
        <rect class="box online" x="440" y="158" width="300" height="72" rx="11"/>
        <text class="t-title t-code" x="590" y="184" text-anchor="middle" font-size="14">classify_intent</text>
        <text x="590" y="204" text-anchor="middle" font-size="12.5">의도 분류 · 키워드 · 대상 학년</text>
        <text class="t-sm" x="590" y="221" text-anchor="middle">4-way: 트랙 / 직무 / 과목 / 일반조언</text>
        <path class="flow" d="M590,230 L590,262" marker-end="url(#ah-purple)"/>

        <!-- diamond -->
        <polygon class="box decision" points="590,260 706,318 590,376 474,318"/>
        <text x="590" y="314" text-anchor="middle" font-size="13">의도 유형?</text>
        <text class="t-sm" x="590" y="332" text-anchor="middle">routing</text>

        <!-- retrieve_rag -->
        <path class="flow route" d="M590,376 L590,418 L460,418 L460,452" marker-end="url(#ah-purple)"/>
        <text class="flow-lbl bg r" x="500" y="408" text-anchor="middle">트랙·직무·과목</text>
        <rect class="box online" x="320" y="452" width="280" height="76" rx="11"/>
        <text class="t-title t-code" x="460" y="480" text-anchor="middle" font-size="14">retrieve_rag</text>
        <text x="460" y="500" text-anchor="middle" font-size="12.5">의도별 다전략 검색</text>
        <text class="t-sm" x="460" y="517" text-anchor="middle">사용자 트랙·학년 컨텍스트 반영</text>

        <!-- generate_response -->
        <path class="flow" d="M460,528 L460,566" marker-end="url(#ah-blue)"/>
        <rect class="box llm" x="320" y="566" width="280" height="76" rx="11"/>
        <text class="t-title t-code" x="460" y="594" text-anchor="middle" font-size="14">generate_response</text>
        <text x="460" y="614" text-anchor="middle" font-size="12.5">RAG 근거 / 일반 응답 (LLM)</text>
        <text class="t-sm" x="460" y="631" text-anchor="middle">근거 외 생성 차단</text>

        <!-- general_advice path -->
        <path class="flow route" d="M706,318 L770,318 L770,604 L600,604" marker-end="url(#ah-purple)"/>
        <text class="flow-lbl bg r" x="770" y="430" text-anchor="middle">general_advice</text>

        <!-- multi-turn loop -->
        <path class="flow" d="M320,604 L168,604 L168,194 L440,194" marker-end="url(#ah-blue)" stroke-dasharray="2 4" opacity="0.7"/>
        <text class="flow-lbl bg" x="200" y="400" text-anchor="middle" transform="rotate(-90 200 400)">멀티턴 맥락 유지</text>

        <!-- output -->
        <path class="flow" d="M460,642 L460,694 L590,694 L590,716" marker-end="url(#ah-blue)"/>
        <rect class="box user" x="430" y="690" width="320" height="56" rx="11"/>
        <text class="t-title" x="590" y="714" text-anchor="middle">챗봇 응답</text>
        <text class="t-sm" x="590" y="734" text-anchor="middle">근거 출처와 함께</text>

        <!-- KB cylinder -->
        <g>
          <path class="data" d="M900,432 a82,14 0 0 1 164,0 v118 a82,14 0 0 1 -164,0 z"/>
          <path class="data" d="M900,432 a82,14 0 0 0 164,0" fill="none"/>
          <text class="t-title" x="982" y="492" text-anchor="middle" font-size="13">LightRAG KB</text>
          <text class="t-sm" x="982" y="512" text-anchor="middle">강의계획서 · 트랙 · 직무</text>
        </g>
        <path class="flow data" d="M900,498 L600,492" marker-end="url(#ah-blue)"/>
        <text class="flow-lbl bg" x="740" y="486" text-anchor="middle">관계 검색</text>
      </svg>
