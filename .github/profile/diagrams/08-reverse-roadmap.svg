<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 700" role="img" aria-label="역추적 로드맵">
  <defs>
    <marker id="ah-blue" markerWidth="11" markerHeight="11" refX="8.5" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L10,5 L0,10 Z" fill="#0066cc"/></marker>
    <marker id="ah-orange" markerWidth="10" markerHeight="10" refX="8" refY="4.5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L9,4.5 L0,9 Z" fill="#ff8c00"/></marker>
    <marker id="ah-purple" markerWidth="11" markerHeight="11" refX="8.5" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L10,5 L0,10 Z" fill="#6b46c1"/></marker>
    <marker id="ah-green" markerWidth="11" markerHeight="11" refX="8.5" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L10,5 L0,10 Z" fill="#28a745"/></marker>
    <marker id="ah-red" markerWidth="11" markerHeight="11" refX="8.5" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L10,5 L0,10 Z" fill="#dc143c"/></marker>
    <style>
      svg { background: transparent; --c-online-f:#d8f0de; --c-online-s:#28a745; --c-offline-f:#e6f2ff; --c-offline-s:#2b7cd3; --c-shared-f:#fff4d6; --c-shared-s:#e0a200; --c-user-f:#ffd0d8; --c-user-s:#dc143c; --c-decision-f:#ece1ff; --c-decision-s:#6b46c1; --c-fallback-f:#ffe5b4; --c-fallback-s:#ff8c00; --c-data-f:#e0efff; --c-data-s:#0066cc; --c-llm-f:#e6d9ff; --c-llm-s:#7c3aed; --c-neutral-f:#eef1f5; --c-neutral-s:#7a8aa0; }
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill:#1a1916; font-size:14px; }
      .box{stroke-width:2}.online{fill:var(--c-online-f);stroke:var(--c-online-s)}.offline{fill:var(--c-offline-f);stroke:var(--c-offline-s)}.shared{fill:var(--c-shared-f);stroke:var(--c-shared-s)}.user{fill:var(--c-user-f);stroke:var(--c-user-s)}.decision{fill:var(--c-decision-f);stroke:var(--c-decision-s)}.fallback{fill:var(--c-fallback-f);stroke:var(--c-fallback-s);stroke-dasharray:6 3}.data{fill:var(--c-data-f);stroke:var(--c-data-s)}.llm{fill:var(--c-llm-f);stroke:var(--c-llm-s)}.neutral{fill:var(--c-neutral-f);stroke:var(--c-neutral-s)}
      .z-green{fill:#eff9f1;stroke:#9bd3a8;stroke-width:1.5}.z-blue{fill:#eff6ff;stroke:#a9cdf0;stroke-width:1.5}.z-yellow{fill:#fff9ec;stroke:#ecd28a;stroke-width:1.5}.z-red{fill:#fff1f2;stroke:#f0b3ba;stroke-width:1.5}.z-grey{fill:#f6f7f9;stroke:#cfd6e0;stroke-width:1.5;stroke-dasharray:7 4}
      .zlab{font-weight:600;fill:#42506a;font-size:14px}.t-title{font-weight:600}.t-code{font-family:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace}.t-sm{font-size:12px;fill:#5a6b80}.t-xs{font-size:11px;fill:#6a7b90}
      .flow{fill:none;stroke:#0066cc;stroke-width:2.4}.flow.fb{stroke:#ff8c00;stroke-width:2;stroke-dasharray:6 3}.flow.data{stroke:#0066cc;stroke-width:1.5;stroke-dasharray:5 3}.flow.route{stroke:#6b46c1;stroke-width:2.2}
      .flow-lbl{font-family:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace;font-size:12px;fill:#0a4a8a;font-weight:500}.flow-lbl.r{fill:#6b46c1}.flow-lbl.o{fill:#c2700a}.flow-lbl.bg{paint-order:stroke;stroke:#fcfcf8;stroke-width:5px;stroke-linejoin:round}
    </style>
  </defs>
        <text class="zlab" x="90" y="40" text-anchor="middle" font-size="13">① 목표 직무</text>
        <text class="zlab" x="330" y="40" text-anchor="middle" font-size="13">② 필요 역량</text>
        <text class="zlab" x="565" y="40" text-anchor="middle" font-size="13">③ 추천 교과목</text>

        <!-- job -->
        <rect class="box user" x="20" y="300" width="150" height="100" rx="11"/>
        <text class="t-title" x="95" y="344" text-anchor="middle" font-size="13">데이터</text>
        <text class="t-title" x="95" y="362" text-anchor="middle" font-size="13">엔지니어</text>

        <!-- competencies -->
        <rect class="box shared" x="240" y="80" width="180" height="74" rx="10"/>
        <text x="330" y="112" text-anchor="middle" font-size="12.5">대용량 데이터 처리</text>
        <text class="t-sm" x="330" y="132" text-anchor="middle">역량 ①</text>
        <rect class="box shared" x="240" y="316" width="180" height="74" rx="10"/>
        <text x="330" y="348" text-anchor="middle" font-size="12.5">SQL · DB 설계</text>
        <text class="t-sm" x="330" y="368" text-anchor="middle">역량 ②</text>
        <rect class="box shared" x="240" y="552" width="180" height="74" rx="10"/>
        <text x="330" y="584" text-anchor="middle" font-size="12.5">ML 파이프라인</text>
        <text class="t-sm" x="330" y="604" text-anchor="middle">역량 ③</text>

        <!-- courses -->
        <rect class="box online" x="470" y="60" width="170" height="52" rx="9"/>
        <text x="555" y="91" text-anchor="middle" font-size="12.5">빅데이터분석</text>
        <rect class="box online" x="470" y="122" width="170" height="52" rx="9"/>
        <text x="555" y="153" text-anchor="middle" font-size="12.5">분산컴퓨팅</text>
        <rect class="box online" x="470" y="296" width="170" height="52" rx="9"/>
        <text x="555" y="327" text-anchor="middle" font-size="12.5">데이터베이스</text>
        <rect class="box online" x="470" y="358" width="170" height="52" rx="9"/>
        <text x="555" y="389" text-anchor="middle" font-size="12.5">고급DB설계</text>
        <rect class="box online" x="470" y="532" width="170" height="52" rx="9"/>
        <text x="555" y="563" text-anchor="middle" font-size="12.5">머신러닝</text>
        <rect class="box online" x="470" y="594" width="170" height="52" rx="9"/>
        <text x="555" y="625" text-anchor="middle" font-size="12.5">딥러닝기초</text>

        <!-- job -> competency (역추적, red dashed) -->
        <path class="flow" stroke="#dc143c" stroke-dasharray="6 3" d="M170,330 L205,330 L205,117 L240,117" marker-end="url(#ah-red)"/>
        <path class="flow" stroke="#dc143c" stroke-dasharray="6 3" d="M170,350 L240,353" marker-end="url(#ah-red)"/>
        <path class="flow" stroke="#dc143c" stroke-dasharray="6 3" d="M170,370 L205,370 L205,589 L240,589" marker-end="url(#ah-red)"/>
        <text class="flow-lbl bg" x="200" y="250" text-anchor="middle" fill="#b01a30" transform="rotate(-90 200 250)">역추적</text>

        <!-- competency -> course (orange dashed) -->
        <path class="flow fb" d="M420,110 L445,110 L445,86 L470,86" marker-end="url(#ah-orange)"/>
        <path class="flow fb" d="M420,128 L445,128 L445,148 L470,148" marker-end="url(#ah-orange)"/>
        <path class="flow fb" d="M420,346 L445,346 L445,322 L470,322" marker-end="url(#ah-orange)"/>
        <path class="flow fb" d="M420,364 L445,364 L445,384 L470,384" marker-end="url(#ah-orange)"/>
        <path class="flow fb" d="M420,582 L445,582 L445,558 L470,558" marker-end="url(#ah-orange)"/>
        <path class="flow fb" d="M420,600 L445,600 L445,620 L470,620" marker-end="url(#ah-orange)"/>
        <text class="t-xs" x="330" y="680" text-anchor="middle">이수 과목은 자동 제외 · 18학점/학기 · 졸업 78학점 제약 반영</text>
      </svg>
